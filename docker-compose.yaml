version: "3.8"
services:
  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
      build: ./Backend
      ports:
        - "8080:8080"
      depends_on:
        - db
      environment:
        - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/pg_rental
        - SPRING_DATASOURCE_USERNAME=Sunil
        - SPRING_DATASOURCE_PASSWORD=Sunil@9177


  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
        MYSQL_DATABASE: pg_rental
        MYSQL_ROOT_PASSWORD: root
        MYSQL_USER: Sunil
        MYSQL_PASSWORD: Sunil@9177
    ports:
    - "3307:3306"
    volumes:
    - mysql-data:/var/lib/mysql

volumes:
      mysql-data:


